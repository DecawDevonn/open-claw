name: AI Propose Fixes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # Daily at 02:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  propose-fixes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r scripts/ai/requirements.txt

      - name: Run AI fix proposal script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/ai/propose_fixes.py

      - name: Open draft PR if fixes were committed
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai/proposed-fixes/${{ github.run_id }}
          base: ${{ github.event.repository.default_branch }}
          draft: true
          title: '[AI] Proposed safe fixes from automated checks'
          body: |
            This draft PR was opened automatically by the **AI Propose Fixes** workflow.

            The script ran `mypy`, `flake8`, and `pytest`, identified low-risk fixable
            issues, and applied minimal patches verified by re-running the checks.

            **Please review every diff carefully before merging.**

            Triggered by: `${{ github.event_name }}` on `${{ github.ref }}`
          commit-message: 'ai: proposed safe fix'
          delete-branch: true
