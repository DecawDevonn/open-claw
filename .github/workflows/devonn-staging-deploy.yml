name: devonn-staging-deploy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: 211125423223.dkr.ecr.us-west-2.amazonaws.com
  ECR_REPOSITORY: devonn-app
  EKS_CLUSTER: devonn-eks-prod
  STAGING_NAMESPACE: devonn-staging

jobs:
  build-and-deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::211125423223:role/devonn-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push staging image
        id: build-image
        env:
          IMAGE_TAG: staging-pr${{ github.event.pull_request.number }}-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Create staging namespace if not exists
        run: |
          kubectl get namespace $STAGING_NAMESPACE 2>/dev/null || \
          kubectl create namespace $STAGING_NAMESPACE

      - name: Deploy to staging namespace
        env:
          IMAGE_TAG: staging-pr${{ github.event.pull_request.number }}-${{ github.sha }}
        run: |
          # Apply or update staging deployment
          kubectl set image deployment/devonn-backend \
            devonn-backend=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -n $STAGING_NAMESPACE 2>/dev/null || \
          kubectl create deployment devonn-backend \
            --image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -n $STAGING_NAMESPACE

          kubectl rollout status deployment/devonn-backend \
            -n $STAGING_NAMESPACE --timeout=120s

      - name: Get staging endpoint
        id: staging-url
        run: |
          # Wait for pod to be ready then get NodePort
          sleep 10
          echo "url=http://$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type==\"ExternalIP\")].address}' 2>/dev/null || echo 'staging-pending')/api/health" >> $GITHUB_OUTPUT

      - name: Comment PR with staging info
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Staging Deployment\n\n**Image:** \`${{ steps.build-image.outputs.image }}\`\n**Namespace:** \`${{ env.STAGING_NAMESPACE }}\`\n**Status:** Deployed successfully\n\nThe staging deployment is running in the \`devonn-staging\` namespace on the production EKS cluster.`
            })

  cleanup-staging:
    name: Cleanup Staging on PR Close
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::211125423223:role/devonn-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Delete staging deployment for this PR
        run: |
          kubectl delete deployment devonn-backend \
            -n $STAGING_NAMESPACE \
            --ignore-not-found=true
          echo "Staging deployment cleaned up for PR #${{ github.event.pull_request.number }}"
