name: CI — Test, Lint & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest-cov coverage

      - name: Run tests with coverage
        env:
          SECRET_KEY: test-secret-key-for-ci-32-chars!!
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-32chars
          FLASK_TESTING: "true"
          RATELIMIT_ENABLED: "false"
        run: |
          python -m pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing --tb=short -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8 mypy
      - run: flake8 app.py storage/ --max-line-length=120 --ignore=E501,W503 || true
      - run: mypy storage/mongo.py --ignore-missing-imports || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install safety
      - run: safety check -r requirements.txt --output text || true
