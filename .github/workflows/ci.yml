name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 app.py storage/ --max-line-length=120

      - name: Type-check (mypy)
        run: |
          pip install mypy types-Flask
          mypy app.py storage/ --ignore-missing-imports --no-strict-optional

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t open-claw:${{ github.sha }} .

      - name: Tag as latest (main branch only)
        if: github.ref == 'refs/heads/main'
        run: docker tag open-claw:${{ github.sha }} open-claw:latest
