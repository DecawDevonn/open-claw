version: '3.8'

services:
  web:
    build: .
    ports:
      - '8080:8080'
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret}
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - PORT=8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
